<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت فروشندگان | Paradise</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { direction: rtl !important; font-family: Tahoma, 'Segoe UI', sans-serif; background-color: #2c3e50; }
        .admin-wrapper { max-width: 750px; margin: 20px auto; background: #fff; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 30px; }
        .admin-table { width: 100%; border-collapse: collapse; text-align: right; margin-top: 10px; }
        .admin-table th, .admin-table td { padding: 15px; border-bottom: 1px solid #eee; }
        .admin-table th { background-color: #2c3e50; color: white; text-align: right; font-size: 15px; }
        .action-buttons { display: flex; gap: 10px; justify-content: center; }
        .admin-input-group { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
    </style>
</head>
<body>

    <div class="actions-bar no-print" style="max-width: 750px; margin: 0 auto 20px auto; display: flex; justify-content: flex-start; gap: 10px;">
        <a href="retail.html" class="btn btn-blue" style="text-decoration:none; width: auto; padding: 10px 20px; font-size: 14px;">🔙 بازگشت به فاکتور</a>
        <a href="customers.html" class="btn btn-gray" style="text-decoration:none; width: auto; padding: 10px 20px; font-size: 14px;">👤 مشتریان</a>
        <a href="profit.html" class="btn btn-success" style="text-decoration:none; width: auto; padding: 10px 20px; font-size: 14px;">💰 محاسبه سود و آمار</a>
    </div>

    <div class="admin-wrapper">
        <h2 style="color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 25px;">⚙️ مدیریت فروشندگان سیستم</h2>
        
        <div class="admin-input-group">
            <input type="text" id="new-seller-name" placeholder="نام فروشنده جدید را بنویسید..." style="flex:1; min-width: 250px; padding: 12px 15px; border: 2px solid #ddd; border-radius: 6px; font-size: 15px; outline: none; transition: 0.3s;">
            <button id="add-seller-btn" class="btn btn-success" style="width: auto; padding: 12px 25px; font-size: 15px; border-radius: 6px;">➕ افزودن به سیستم</button>
        </div>

        <div style="overflow-x: auto; border-radius: 6px; border: 1px solid #eee;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>نام فروشنده</th>
                        <th style="width: 220px; text-align: center;">عملیات (ویرایش / حذف)</th>
                    </tr>
                </thead>
                <tbody id="sellers-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
