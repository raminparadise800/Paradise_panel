<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم | Paradise Invoicing</title>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #2c3e50, #3498db); height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Tahoma, 'Segoe UI', sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        .login-logo { width: 90px; height: 90px; background: #111; color: #e1b12c; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 20px auto; font-weight: bold; font-style: italic; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .login-logo span { color: white; font-size: 12px; font-style: normal; margin-top: 2px; }
        .login-box h2 { color: #2c3e50; margin-bottom: 30px; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; color: #7f8c8d; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 15px; outline: none; transition: 0.3s; box-sizing: border-box; direction: ltr; font-family: Arial, sans-serif; }
        .input-group input:focus { border-color: #3498db; background-color: #f8fbff; }
        .login-btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .login-btn:hover { background: #2196f3; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="login-logo">
            <p style="margin:0; font-size:18px;">Paradise</p>
            <span>Wear</span>
        </div>
        <h2>ورود به پورتال سازمانی</h2>
        
        <form id="login-form">
            <div class="input-group">
                <label>ایمیل (Email Address):</label>
                <input type="email" id="email" required placeholder="admin@example.com">
            </div>
            
            <div class="input-group">
                <label>رمز عبور (Password):</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="login-btn">ورود به سیستم</button>
            <p id="error-message" style="color: #e74c3c; margin-top: 15px; font-size: 14px; display: none; font-weight: bold;">❌ ایمیل یا رمز عبور اشتباه است.</p>
        </form>
    </div>

    <script type="module" src="auth.js"></script>

</body>
</html>
