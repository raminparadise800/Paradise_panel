<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آمار فروش و سود خالص | Paradise</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #2c3e50; font-family: Tahoma, 'Segoe UI', sans-serif; }
        .wrapper { max-width: 1200px; margin: 20px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* استایل تب‌ها */
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; gap: 10px; }
        .tab-btn { padding: 12px 25px; border: none; background: #f8f9fa; cursor: pointer; font-size: 16px; font-weight: bold; color: #7f8c8d; border-radius: 8px 8px 0 0; transition: 0.3s; }
        .tab-btn.active { background: #3498db; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* فیلتر تاریخ */
        .date-filter { background: #fdfdfd; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; }
        .date-filter select, .date-filter input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: Tahoma; }
        
        /* داشبورد */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #f8f9fa; border: 1px solid #e0e0e0; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card h4 { color: #7f8c8d; font-size: 14px; margin-bottom: 10px; }
        .stat-card span { display: block; font-size: 22px; font-weight: bold; color: #2c3e50; }
        
        /* جداول محاسبه سود */
        .inv-card { border: 1px solid #34495e; border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
        .inv-header { background: #34495e; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .inv-body { padding: 15px; background: #fafafa; }
        .items-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; text-align: right; }
        .items-table th, .items-table td { padding: 10px; border-bottom: 1px solid #ddd; font-size: 14px; }
        .items-table input { width: 80px; padding: 5px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="actions-bar no-print" style="max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: flex-start;">
        <a href="admin.html" class="btn btn-blue" style="text-decoration:none; width: auto; padding: 10px 20px;">🔙 بازگشت به مدیریت</a>
    </div>

    <div class="wrapper">
        <div class="tabs">
            <button class="tab-btn active" data-target="tab-dashboard">📊 داشبورد کلان</button>
            <button class="tab-btn" data-target="tab-calc">📝 محاسبه سود فاکتورها</button>
            <button class="tab-btn" data-target="tab-sellers">👥 آمار فروشندگان</button>
        </div>

        <div class="date-filter">
            <strong style="color:#2c3e50;">📅 بازه زمانی:</strong>
            <select id="date-range">
                <option value="all">همه زمان‌ها</option>
                <option value="30days">۳۰ روز گذشته</option>
                <option value="thisMonth">ماه جاری</option>
                <option value="custom">انتخاب دستی...</option>
            </select>
            <div id="custom-dates" style="display: none; gap: 10px;">
                <input type="date" id="date-from"> تا <input type="date" id="date-to">
                <button id="apply-date-btn" class="btn-small" style="background:#27ae60;">اعمال</button>
            </div>
        </div>

        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card"><h4>حجم کل فروش تک‌فروشی</h4><span id="dash-retail-vol" style="color:#2980b9;">0 €</span></div>
                <div class="stat-card"><h4>حجم کل فروش عمده</h4><span id="dash-wholesale-vol" style="color:#8e44ad;">0 €</span></div>
                <div class="stat-card" style="background:#e8f8f5;"><h4>سود خالص تک‌فروشی</h4><span id="dash-retail-profit" style="color:#27ae60;">0 €</span></div>
                <div class="stat-card" style="background:#f4ecf7;"><h4>سود خالص عمده‌فروشی</h4><span id="dash-wholesale-profit" style="color:#27ae60;">0 €</span></div>
            </div>
            <div style="background: #fff; padding: 20px; border: 1px solid #eee; border-radius: 8px;">
                <h3 style="color:#2c3e50; font-size: 16px; margin-bottom: 15px;">🌍 برترین کشورهای خریدار (حجم خرید):</h3>
                <div id="top-countries" style="display:flex; flex-direction:column; gap:10px;"></div>
            </div>
        </div>

        <div id="tab-calc" class="tab-content">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="filter-pending" class="btn-small" style="background:#e67e22; padding:10px; font-size:14px;">در نوبت محاسبه</button>
                <button id="filter-completed" class="btn-small" style="background:#27ae60; padding:10px; font-size:14px;">محاسبه شده (امکان ویرایش)</button>
            </div>
            <div id="calculator-list">
                </div>
        </div>

        <div id="tab-sellers" class="tab-content">
            <table class="items-table" style="background:#fff;">
                <thead style="background:#2c3e50; color:white;">
                    <tr>
                        <th>نام فروشنده</th>
                        <th>حجم فروش تک</th>
                        <th>حجم فروش عمده</th>
                        <th>سوددهی کل</th>
                    </tr>
                </thead>
                <tbody id="sellers-stats-body">
                    </tbody>
            </table>
        </div>

    </div>

    <script type="module" src="profit.js"></script>
</body>
</html>
